<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keto Meal & Stock Planner</title>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --bg-tertiary: #f1f5f9;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-light: #e2e8f0;
            --border-medium: #cbd5e1;
            --accent-primary: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #64748b;
            --border-light: #334155;
            --border-medium: #475569;
            --accent-primary: #60a5fa;
            --accent-hover: #3b82f6;
            --success: #34d399;
            --warning: #fbbf24;
            --danger: #f87171;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .app-container {
            max-width: 428px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--bg-primary);
            position: relative;
            padding-bottom: 80px;
        }

        .header {
            position: sticky;
            top: 0;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-light);
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .header h1 { font-size: 1.25rem; font-weight: 600; }

        .theme-toggle {
            background: none;
            border: 1px solid var(--border-medium);
            padding: 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        .theme-toggle:hover { background: var(--bg-secondary); }

        .main-content { padding: 1rem; min-height: calc(100vh - 140px); }

        .screen { display: none; }
        .screen.active { display: block; }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 428px;
            background: var(--bg-primary);
            border-top: 1px solid var(--border-light);
            display: flex;
            justify-content: space-around;
            padding: 0.75rem 0;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            padding: 0.5rem;
            color: var(--text-muted);
            font-size: 0.75rem;
            cursor: pointer;
        }
        .nav-item.active { color: var(--accent-primary); }
        .nav-icon { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .btn {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
        }
        .btn:hover { background: var(--accent-hover); }
        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-medium);
        }
        .btn-small { padding: 0.5rem 1rem; font-size: 0.75rem; width: auto; }

        .form-group { margin-bottom: 1rem; }
        .form-label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-secondary); }
        .form-input, .form-select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-medium);
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 1rem;
        }

        .item-list { display: flex; flex-direction: column; gap: 0.75rem; }
        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            cursor: pointer;
        }
        .item-row:hover { background: var(--bg-tertiary); }
        .item-info { flex: 1; }
        .item-name { font-weight: 500; margin-bottom: 0.25rem; }
        .item-details { font-size: 0.875rem; color: var(--text-secondary); }
        .item-quantity { font-weight: 600; color: var(--accent-primary); }
        .category-badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            background: var(--bg-tertiary);
            border-radius: 4px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .fab {
            position: fixed;
            bottom: 100px;
            right: 1rem;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--accent-primary);
            color: white;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 12px var(--shadow);
            transition: transform 0.2s ease;
            z-index: 50;
        }
        .fab:hover { transform: scale(1.1); }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            z-index: 1000;
            padding: 1rem;
            display: none;
            overflow-y: auto;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--bg-primary);
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            padding: 1.5rem;
            margin: 2rem auto;
            max-height: calc(100vh - 4rem);
            overflow-y: auto;
        }
        .modal-large { max-width: 500px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .modal-title { font-size: 1.125rem; font-weight: 600; }
        .close-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-secondary); }
        .scrollable-content { max-height: 300px; overflow-y: auto; border: 1px solid var(--border-light); border-radius: 8px; padding: 0.75rem; }

        .date-tabs {
            display: flex;
            background: var(--bg-secondary);
            border-radius: 8px;
            margin-bottom: 1.5rem;
            overflow-x: auto;
            gap: 0.25rem;
            padding: 0.25rem;
        }
        .date-tab {
            flex: 0 0 auto;
            padding: 0.5rem 0.75rem;
            text-align: center;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 6px;
        }
        .date-tab.active { background: var(--accent-primary); color: white; }

        .meal-slots { display: grid; gap: 1rem; margin-bottom: 1.5rem; }
        .meal-slot {
            position: relative;
            background: var(--bg-secondary);
            border: 2px solid var(--border-light);
            border-radius: 8px;
            padding: 1rem;
            transition: all 0.2s ease;
        }
        .meal-slot:hover { border-color: var(--accent-primary); background: var(--bg-tertiary); }
        .meal-slot.filled { border-color: var(--accent-primary); background: var(--bg-primary); }
        .meal-slot.consumed {
            opacity: 0.6;
            border-color: var(--text-muted);
            background: var(--bg-tertiary);
        }
        .meal-slot.consumed .meal-content { text-decoration: line-through; }
        .meal-slot .eat-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: none;
            border: none;
            font-size: 1.25rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: transform 0.1s;
        }
        .meal-slot .eat-btn:hover { transform: scale(1.1); }
        .meal-slot .eat-btn.consumed { color: var(--success); }

        .meal-content { margin-top: 0.5rem; padding-right: 2rem; }
        .meal-details { font-size: 0.875rem; color: var(--text-secondary); margin-top: 0.25rem; }
        .meal-ingredients { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem; }
        .meal-calories { font-weight: 600; color: var(--accent-primary); font-size: 0.875rem; }
        .meal-notes { font-size: 0.8rem; color: var(--text-muted); font-style: italic; }

        #daily-totals { text-align: center; }
        .calorie-total { font-size: 1.25rem; font-weight: 600; color: var(--accent-primary); }

        .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }

        .shopping-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 0; border-bottom: 1px solid var(--border-light); }
        .shopping-checkbox { width: 18px; height: 18px; accent-color: var(--accent-primary); }
        .shopping-item.checked .item-name { text-decoration: line-through; color: var(--text-muted); }

        .supplement-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 0.75rem 0; border-bottom: 1px solid var(--border-light); }
        .supplement-item:last-child { border-bottom: none; }
        .supplement-info h4 { font-weight: 600; margin-bottom: 0.25rem; }
        .supplement-dosage { color: var(--accent-primary); font-weight: 500; font-size: 0.875rem; }
        .supplement-reason { font-size: 0.875rem; color: var(--text-secondary); }

        .ingredient-row { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0; border-bottom: 1px solid var(--border-light); }
        .ingredient-input { width: 80px; padding: 0.25rem 0.5rem; border: 1px solid var(--border-medium); border-radius: 4px; background: var(--bg-primary); color: var(--text-primary); font-size: 0.875rem; }

        .low-stock { color: var(--warning); }
        .out-of-stock { color: var(--danger); }

        @keyframes slideDown {
            from { transform: translateX(-50%) translateY(-100%); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        @media (max-width: 428px) {
            .app-container { max-width: 100vw; }
            .bottom-nav { max-width: 100vw; }
            .nav-item { font-size: 0.7rem; }
            .modal { padding: 0.5rem; }
            .modal-content { margin: 1rem auto; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1 id="page-title">Keto Meal & Stock Planner</h1>
        <button class="theme-toggle" id="theme-toggle">
            <svg class="nav-icon" viewBox="0 0 24 24" width="20" height="20">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="none" stroke="currentColor" stroke-width="2"/>
            </svg>
        </button>
    </div>

    <div class="main-content">
        <div class="screen active" id="inventory-screen">
            <div class="item-list" id="inventory-list"><div class="empty-state"><p>Loading inventory...</p></div></div>
        </div>

        <div class="screen" id="plan-screen">
            <div class="date-tabs" id="date-tabs-container"></div>
            <div class="meal-slots" id="meal-slots-container"></div>
            <div class="card" id="daily-totals">
                <h3>Daily Totals</h3>
                <div class="totals-content"><span class="calorie-total">~0 kcal</span></div>
            </div>
            <button class="btn btn-secondary" id="reset-consumed-btn">⟳ Reset Eaten Meals</button>
        </div>

        <div class="screen" id="shopping-screen">
            <div class="card"><button class="btn" id="generate-shopping-list">Generate Shopping List</button></div>
            <div id="shopping-list"><div class="empty-state"><p>No shopping list generated yet.</p></div></div>
        </div>

        <div class="screen" id="supplements-screen">
            <div class="card">
                <h3>🧪 Recommended Daily Supplements</h3>
                <p style="color: var(--text-secondary); margin-bottom: 1rem;">Based on your keto protocol:</p>
                <div id="supplements-list"></div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" data-screen="inventory">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
            <span>Inventory</span>
        </div>
        <div class="nav-item" data-screen="plan">
            <svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span>Plan</span>
        </div>
        <div class="nav-item" data-screen="shopping">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            <span>Shopping</span>
        </div>
        <div class="nav-item" data-screen="supplements">
            <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            <span>Supplements</span>
        </div>
    </div>

    <button class="fab" id="add-item-fab">+</button>

    <!-- Item Modal -->
    <div class="modal" id="item-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="item-modal-title">Add Item</h2>
                <button class="close-btn" id="close-item-modal">&times;</button>
            </div>
            <form id="item-form">
                <div class="form-group"><label class="form-label">Name</label><input type="text" class="form-input" id="item-name" required></div>
                <div class="form-group">
                    <label class="form-label">Category</label>
                    <select class="form-select" id="item-category">
                        <option value="protein">Protein</option><option value="dairy">Dairy</option>
                        <option value="pantry">Pantry</option><option value="produce">Produce</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Unit</label>
                    <select class="form-select" id="item-unit">
                        <option value="g">Grams (g)</option><option value="ml">Milliliters (ml)</option>
                        <option value="pcs">Pieces (pcs)</option><option value="kg">Kilograms (kg)</option>
                        <option value="l">Liters (l)</option>
                    </select>
                </div>
                <div class="form-group"><label class="form-label">Quantity</label><input type="number" class="form-input" id="item-quantity" min="0" step="0.1" required></div>
                <div style="display: flex; gap: 0.5rem;">
                    <button type="submit" class="btn">Save Item</button>
                    <button type="button" class="btn btn-secondary" id="delete-item" style="display: none;">Delete</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Meal Modal -->
    <div class="modal" id="meal-modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2 class="modal-title" id="meal-modal-title">Edit Meal</h2>
                <button class="close-btn" id="close-meal-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group"><label class="form-label">Meal Name</label><input type="text" class="form-input" id="meal-name" placeholder="Enter meal name"></div>
                <div class="form-group"><label class="form-label">Calories (optional)</label><input type="number" class="form-input" id="meal-calories" placeholder="e.g., 550"></div>
                <div class="form-group"><label class="form-label">Notes (optional)</label><textarea class="form-input" id="meal-notes" placeholder="e.g., work lunch" rows="2"></textarea></div>
                <div class="form-group"><label class="form-label">Ingredients</label><div id="meal-ingredients" class="scrollable-content"></div></div>
            </div>
            <button class="btn" id="save-meal">Save Meal</button>
        </div>
    </div>
</div>

<script src="data.js"></script>
<script>
    // ---------- Data Storage Layer ----------
    class DataStore {
        constructor() {
            this.data = this.loadData();
            // Ensure consumedMeals exists
            if (!this.data.consumedMeals) this.data.consumedMeals = [];
            this.saveData();
        }
        loadData() {
            const stored = localStorage.getItem('mealPlannerDatakd');
            if (stored) return JSON.parse(stored);
            if (typeof DEFAULT_DATA !== 'undefined') {
                const defaultData = JSON.parse(JSON.stringify(DEFAULT_DATA));
                defaultData.consumedMeals = [];
                return defaultData;
            }
            return { items: [], meals: [], plan: [], supplements: [], notes: {}, consumedMeals: [] };
        }
        saveData() { localStorage.setItem('mealPlannerDatakd', JSON.stringify(this.data)); }
        generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2); }
        addItem(item) { item.id = this.generateId(); this.data.items.push(item); this.saveData(); return item; }
        updateItem(id, updates) {
            const idx = this.data.items.findIndex(i => i.id === id);
            if (idx !== -1) { this.data.items[idx] = { ...this.data.items[idx], ...updates }; this.saveData(); return this.data.items[idx]; }
            return null;
        }
        deleteItem(id) { this.data.items = this.data.items.filter(i => i.id !== id); this.saveData(); }
        getItems() { return this.data.items; }
        getItem(id) { return this.data.items.find(i => i.id === id); }
        getMeal(id) { return this.data.meals.find(m => m.id === id); }
        updateMeal(id, updates) {
            const idx = this.data.meals.findIndex(m => m.id === id);
            if (idx !== -1) { this.data.meals[idx] = { ...this.data.meals[idx], ...updates }; this.saveData(); return this.data.meals[idx]; }
            return null;
        }
        addMeal(meal) { meal.id = this.generateId(); this.data.meals.push(meal); this.saveData(); return meal; }
        setPlanSlot(dayIdx, slotIdx, mealId) {
            if (this.data.plan[dayIdx]) { this.data.plan[dayIdx].slots[slotIdx] = mealId; this.saveData(); }
        }
        getPlan() { return this.data.plan; }
        getSupplements() { return this.data.supplements || []; }
        getNotes() { return this.data.notes || {}; }

        // Consumed meals: store as "dayIdx-slotIdx" strings
        isMealConsumed(dayIdx, slotIdx) {
            return this.data.consumedMeals.includes(`${dayIdx}-${slotIdx}`);
        }
        markMealConsumed(dayIdx, slotIdx) {
            const key = `${dayIdx}-${slotIdx}`;
            if (!this.data.consumedMeals.includes(key)) {
                this.data.consumedMeals.push(key);
                this.saveData();
                return true;
            }
            return false;
        }
        resetAllConsumed() {
            this.data.consumedMeals = [];
            this.saveData();
        }
    }

    // ---------- App Controller ----------
    class MealPlannerApp {
        constructor() {
            this.dataStore = new DataStore();
            this.currentScreen = 'inventory';
            this.currentDay = 0;
            this.editingItemId = null;
            this.currentMealSlot = null;
            this.editingMealId = null;
            this.initializeApp();
        }

        initializeApp() {
            this.setupEventListeners();
            this.setupThemeToggle();
            this.renderCurrentScreen();
            this.generateDateTabs();
        }

        setupEventListeners() {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', (e) => this.switchScreen(e.currentTarget.dataset.screen));
            });
            document.getElementById('theme-toggle').addEventListener('click', () => this.toggleTheme());
            document.getElementById('add-item-fab').addEventListener('click', () => this.openItemModal());
            document.getElementById('close-item-modal').addEventListener('click', () => this.closeItemModal());
            document.getElementById('item-form').addEventListener('submit', (e) => this.handleItemSubmit(e));
            document.getElementById('delete-item').addEventListener('click', () => this.deleteCurrentItem());
            document.getElementById('close-meal-modal').addEventListener('click', () => this.closeMealModal());
            document.getElementById('save-meal').addEventListener('click', () => this.saveMeal());
            document.getElementById('generate-shopping-list').addEventListener('click', () => this.generateShoppingList());
            document.getElementById('reset-consumed-btn').addEventListener('click', () => this.resetConsumedMeals());
            document.querySelectorAll('.modal').forEach(modal => {
                modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('show'); });
            });
        }

        setupThemeToggle() {
            const saved = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
        }
        toggleTheme() {
            const cur = document.documentElement.getAttribute('data-theme');
            const next = cur === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }

        generateDateTabs() {
            const plan = this.dataStore.getPlan();
            const container = document.getElementById('date-tabs-container');
            if (!container) return;
            container.innerHTML = '';
            plan.forEach((_, idx) => {
                const btn = document.createElement('button');
                btn.className = 'date-tab' + (idx === this.currentDay ? ' active' : '');
                btn.textContent = `Day ${idx+1}`;
                btn.dataset.date = idx;
                btn.addEventListener('click', () => this.switchDay(idx));
                container.appendChild(btn);
            });
        }

        switchDay(dayIndex) {
            this.currentDay = dayIndex;
            document.querySelectorAll('.date-tab').forEach((tab, i) => {
                if (i == dayIndex) tab.classList.add('active');
                else tab.classList.remove('active');
            });
            this.renderPlan();
        }

        switchScreen(screen) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.querySelector(`[data-screen="${screen}"]`).classList.add('active');
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`${screen}-screen`).classList.add('active');
            const titles = { inventory:'Inventory', plan:'Meal Plan', shopping:'Shopping List', supplements:'Supplements' };
            document.getElementById('page-title').textContent = titles[screen];
            document.getElementById('add-item-fab').style.display = screen === 'inventory' ? 'block' : 'none';
            this.currentScreen = screen;
            this.renderCurrentScreen();
        }

        renderCurrentScreen() {
            if (this.currentScreen === 'inventory') this.renderInventory();
            else if (this.currentScreen === 'plan') this.renderPlan();
            else if (this.currentScreen === 'shopping') this.renderShopping();
            else if (this.currentScreen === 'supplements') this.renderSupplements();
        }

        renderInventory() {
            const items = this.dataStore.getItems();
            const container = document.getElementById('inventory-list');
            if (!items.length) {
                container.innerHTML = `<div class="empty-state"><p>No items in your inventory yet.</p><p>Tap the + button to add your first item!</p></div>`;
                return;
            }
            container.innerHTML = items.map(item => {
                const stockClass = item.quantity <= 0 ? 'out-of-stock' : (item.quantity < 10 && item.unit !== 'g' && item.unit !== 'ml' ? 'low-stock' : '');
                return `<div class="item-row" data-item-id="${item.id}">
                            <div class="item-info"><div class="item-name">${item.name}</div><div class="item-details"><span class="category-badge">${item.category}</span></div></div>
                            <div class="item-quantity ${stockClass}">${item.quantity} ${item.unit}</div>
                        </div>`;
            }).join('');
            container.querySelectorAll('.item-row').forEach(row => {
                row.addEventListener('click', (e) => this.openItemModal(row.dataset.itemId));
            });
        }

        renderPlan() {
            const plan = this.dataStore.getPlan();
            if (!plan.length) return;
            const currentPlan = plan[this.currentDay];
            const slotsContainer = document.getElementById('meal-slots-container');
            const mealNames = ['Breakfast', 'Lunch', 'Dinner', 'Snack / Bridge'];
            let dayTotal = 0;

            slotsContainer.innerHTML = '';
            for (let i = 0; i < 4; i++) {
                const mealId = currentPlan.slots[i];
                const mealData = mealId ? this.dataStore.getMeal(mealId) : null;
                const consumed = this.dataStore.isMealConsumed(this.currentDay, i);
                const slotDiv = document.createElement('div');
                slotDiv.className = `meal-slot ${mealData ? 'filled' : ''} ${consumed ? 'consumed' : ''}`;
                slotDiv.innerHTML = `
                    <strong>${mealNames[i]}</strong>
                    <button class="eat-btn ${consumed ? 'consumed' : ''}" data-day="${this.currentDay}" data-slot="${i}">${consumed ? '✓' : '✔️'}</button>
                    <div class="meal-content"></div>
                `;
                const contentDiv = slotDiv.querySelector('.meal-content');
                if (mealData && !consumed) {
                    const ingredientsList = mealData.ingredients.map(ing => `${ing.quantity}${ing.unit} ${ing.name}`).join(', ');
                    const caloriesText = mealData.calories ? `<div class="meal-calories">${mealData.calories} kcal</div>` : '';
                    const notesText = mealData.notes ? `<div class="meal-notes">${mealData.notes}</div>` : '';
                    contentDiv.innerHTML = `<div class="meal-details">${mealData.name}</div><div class="meal-ingredients">${ingredientsList}</div>${caloriesText}${notesText}`;
                    if (mealData.calories) dayTotal += mealData.calories;
                } else if (mealData && consumed) {
                    // Show basic info but dimmed
                    const ingredientsList = mealData.ingredients.map(ing => `${ing.quantity}${ing.unit} ${ing.name}`).join(', ');
                    contentDiv.innerHTML = `<div class="meal-details">${mealData.name}</div><div class="meal-ingredients">${ingredientsList}</div><span style="color:var(--success);">✓ Eaten</span>`;
                } else {
                    contentDiv.textContent = 'Tap to add meal';
                }

                // Eat button handler
                const eatBtn = slotDiv.querySelector('.eat-btn');
                if (eatBtn) {
                    eatBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.markMealAsEaten(this.currentDay, i, mealId);
                    });
                }

                // Click on slot (but not on button) opens edit modal, only if not consumed
                slotDiv.addEventListener('click', (e) => {
                    if (e.target === eatBtn) return;
                    if (!consumed) this.openMealSlot(this.currentDay, i, mealId);
                });
                slotsContainer.appendChild(slotDiv);
            }
            document.querySelector('.calorie-total').textContent = `~${dayTotal} kcal`;
        }

        markMealAsEaten(dayIdx, slotIdx, mealId) {
            if (!mealId) {
                this.showToast("No meal assigned to this slot.");
                return;
            }
            if (this.dataStore.isMealConsumed(dayIdx, slotIdx)) {
                this.showToast("Meal already eaten.");
                return;
            }
            const meal = this.dataStore.getMeal(mealId);
            if (!meal) return;

            // Confirm
            if (!confirm(`Mark "${meal.name}" as eaten? This will deduct ingredients from your inventory.`)) return;

            // Deduct ingredients
            let insufficient = false;
            for (const ing of meal.ingredients) {
                const item = this.dataStore.getItem(ing.itemId);
                if (item) {
                    const newQty = item.quantity - ing.quantity;
                    this.dataStore.updateItem(ing.itemId, { quantity: Math.max(0, newQty) });
                    if (newQty < 0) insufficient = true;
                }
            }
            // Mark consumed
            this.dataStore.markMealConsumed(dayIdx, slotIdx);
            this.renderPlan();
            this.renderInventory(); // update inventory view if visible
            if (insufficient) this.showToast("⚠️ Some ingredients were under-stocked (negative quantity).");
            else this.showToast(`✅ ${meal.name} eaten! Inventory updated.`);
        }

        resetConsumedMeals() {
            if (confirm("Reset all eaten meals? This will NOT restore inventory – only re-enable meals for editing/eating.")) {
                this.dataStore.resetAllConsumed();
                this.renderPlan();
                this.showToast("All meals reactivated.");
            }
        }

        renderShopping() { /* shown on demand */ }
        renderSupplements() {
            const supplements = this.dataStore.getSupplements();
            const notes = this.dataStore.getNotes();
            const container = document.getElementById('supplements-list');
            const essential = supplements.filter(s => s.priority === 'essential');
            const optional = supplements.filter(s => s.priority === 'optional');
            let html = '';
            if (essential.length) {
                html += '<h4 style="margin-bottom:0.75rem;color:var(--accent-primary);">Essential</h4>';
                essential.forEach(s => { html += `<div class="supplement-item"><div class="supplement-info"><h4>${s.name}</h4><div class="supplement-reason">${s.reason}</div></div><div class="supplement-dosage">${s.dosage}</div></div>`; });
            }
            if (optional.length) {
                html += '<h4 style="margin:1.5rem 0 0.75rem;color:var(--text-secondary);">Optional</h4>';
                optional.forEach(s => { html += `<div class="supplement-item"><div class="supplement-info"><h4>${s.name}</h4><div class="supplement-reason">${s.reason}</div></div><div class="supplement-dosage">${s.dosage}</div></div>`; });
            }
            if (notes.nutritionalStatus) {
                html += `<div style="margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border-light);"><h4>📌 Nutritional Notes</h4>${notes.nutritionalStatus.map(n => `<p style="font-size:0.875rem;color:var(--text-secondary);margin-bottom:0.5rem;">• ${n}</p>`).join('')}</div>`;
            }
            container.innerHTML = html;
        }

        openItemModal(itemId = null) {
            this.editingItemId = itemId;
            const modal = document.getElementById('item-modal');
            const title = document.getElementById('item-modal-title');
            const delBtn = document.getElementById('delete-item');
            if (itemId) {
                const item = this.dataStore.getItem(itemId);
                title.textContent = 'Edit Item';
                delBtn.style.display = 'block';
                document.getElementById('item-name').value = item.name;
                document.getElementById('item-category').value = item.category;
                document.getElementById('item-unit').value = item.unit;
                document.getElementById('item-quantity').value = item.quantity;
            } else {
                title.textContent = 'Add Item';
                delBtn.style.display = 'none';
                document.getElementById('item-form').reset();
            }
            modal.classList.add('show');
        }
        closeItemModal() { document.getElementById('item-modal').classList.remove('show'); this.editingItemId = null; }
        handleItemSubmit(e) {
            e.preventDefault();
            const itemData = {
                name: document.getElementById('item-name').value.trim(),
                category: document.getElementById('item-category').value,
                unit: document.getElementById('item-unit').value,
                quantity: parseFloat(document.getElementById('item-quantity').value)
            };
            if (this.editingItemId) this.dataStore.updateItem(this.editingItemId, itemData);
            else this.dataStore.addItem(itemData);
            this.closeItemModal();
            if (this.currentScreen === 'inventory') this.renderInventory();
        }
        deleteCurrentItem() {
            if (this.editingItemId && confirm('Delete this item?')) {
                this.dataStore.deleteItem(this.editingItemId);
                this.closeItemModal();
                if (this.currentScreen === 'inventory') this.renderInventory();
            }
        }

        openMealSlot(dayIdx, slotIdx, existingMealId = null) {
            if (this.dataStore.isMealConsumed(dayIdx, slotIdx)) {
                this.showToast("Cannot edit a meal that has already been eaten. Reset it first.");
                return;
            }
            this.currentMealSlot = { dayIndex: dayIdx, slotIndex: slotIdx };
            this.editingMealId = existingMealId;
            if (this.dataStore.getItems().length === 0) { alert('Add some items to your inventory first!'); return; }
            const modal = document.getElementById('meal-modal');
            document.getElementById('meal-modal-title').textContent = existingMealId ? 'Edit Meal' : 'Add Meal';
            if (existingMealId) {
                const meal = this.dataStore.getMeal(existingMealId);
                document.getElementById('meal-name').value = meal.name || '';
                document.getElementById('meal-calories').value = meal.calories || '';
                document.getElementById('meal-notes').value = meal.notes || '';
            } else {
                document.getElementById('meal-name').value = '';
                document.getElementById('meal-calories').value = '';
                document.getElementById('meal-notes').value = '';
            }
            this.renderMealIngredients();
            modal.classList.add('show');
        }
        renderMealIngredients() {
            const container = document.getElementById('meal-ingredients');
            const items = this.dataStore.getItems();
            if (!items.length) { container.innerHTML = '<div class="empty-state"><p>No items available.</p></div>'; return; }
            let existing = {};
            if (this.editingMealId) {
                const meal = this.dataStore.getMeal(this.editingMealId);
                if (meal && meal.ingredients) meal.ingredients.forEach(ing => { existing[ing.itemId] = ing.quantity; });
            }
            container.innerHTML = items.map(item => `<div class="ingredient-row">
                <div class="item-info" style="flex:1;"><div class="item-name">${item.name}</div><div class="item-details" style="font-size:0.75rem;">Available: ${item.quantity} ${item.unit}</div></div>
                <input type="number" class="ingredient-input" placeholder="0" value="${existing[item.id] || ''}" min="0" step="0.1" data-item-id="${item.id}">
                <span style="font-size:0.875rem;color:var(--text-secondary);width:35px;">${item.unit}</span>
            </div>`).join('');
        }
        closeMealModal() { document.getElementById('meal-modal').classList.remove('show'); this.currentMealSlot = null; this.editingMealId = null; }
        saveMeal() {
            if (!this.currentMealSlot) return;
            const inputs = document.querySelectorAll('#meal-ingredients input[data-item-id]');
            const ingredients = [];
            inputs.forEach(inp => {
                const qty = parseFloat(inp.value) || 0;
                if (qty > 0) {
                    const item = this.dataStore.getItem(inp.dataset.itemId);
                    if (item) ingredients.push({ itemId: item.id, name: item.name, quantity: qty, unit: item.unit });
                }
            });
            if (!ingredients.length) { alert('Add at least one ingredient.'); return; }
            const mealName = document.getElementById('meal-name').value.trim() || ingredients.map(i=>i.name).slice(0,3).join(', ');
            const calories = parseInt(document.getElementById('meal-calories').value) || null;
            const notes = document.getElementById('meal-notes').value.trim();
            const mealData = { name: mealName, ingredients, calories, notes };
            let mealId;
            if (this.editingMealId) { this.dataStore.updateMeal(this.editingMealId, mealData); mealId = this.editingMealId; }
            else { mealId = this.dataStore.addMeal(mealData).id; }
            this.dataStore.setPlanSlot(this.currentMealSlot.dayIndex, this.currentMealSlot.slotIndex, mealId);
            this.closeMealModal();
            this.renderPlan();
            this.showToast('Meal saved!');
        }

        generateShoppingList() {
            const plan = this.dataStore.getPlan();
            const items = this.dataStore.getItems();
            const neededMap = new Map();
            plan.forEach(day => {
                day.slots.forEach(mealId => {
                    const meal = mealId ? this.dataStore.getMeal(mealId) : null;
                    if (meal && meal.ingredients) {
                        meal.ingredients.forEach(ing => {
                            const invItem = this.dataStore.getItem(ing.itemId);
                            if (invItem) {
                                const key = ing.itemId;
                                const cur = neededMap.get(key) || { name: invItem.name, category: invItem.category, unit: invItem.unit, needed: 0, current: invItem.quantity };
                                cur.needed += ing.quantity;
                                neededMap.set(key, cur);
                            }
                        });
                    }
                });
            });
            const toBuy = [];
            neededMap.forEach(item => {
                const deficit = item.needed - item.current;
                if (deficit > 0) toBuy.push({ ...item, buyQuantity: Math.ceil(deficit * 10) / 10 });
            });
            this.renderShoppingList(toBuy);
        }
        renderShoppingList(shoppingItems) {
            const container = document.getElementById('shopping-list');
            if (!shoppingItems.length) {
                container.innerHTML = `<div class="empty-state"><p>🎉 You have everything you need!</p><p>Your current inventory covers all planned meals.</p></div>`;
                return;
            }
            const grouped = {};
            shoppingItems.forEach(item => { if (!grouped[item.category]) grouped[item.category] = []; grouped[item.category].push(item); });
            let html = '';
            Object.keys(grouped).forEach(cat => {
                html += `<div class="card"><h3 style="margin-bottom:1rem;text-transform:capitalize;color:var(--accent-primary);">${cat}</h3>`;
                grouped[cat].forEach(item => {
                    html += `<div class="shopping-item"><input type="checkbox" class="shopping-checkbox" data-item="${item.name}"><div class="item-info"><div class="item-name">${item.name}</div><div class="item-details">Need: ${item.buyQuantity} ${item.unit} (have ${item.current} ${item.unit})</div></div></div>`;
                });
                html += `</div>`;
            });
            html += `<div class="card"><button class="btn" id="mark-purchased">Update Inventory from Purchases</button></div>`;
            container.innerHTML = html;
            container.querySelectorAll('.shopping-checkbox').forEach(cb => {
                cb.addEventListener('change', e => { if (e.target.checked) e.target.closest('.shopping-item').classList.add('checked'); else e.target.closest('.shopping-item').classList.remove('checked'); });
            });
            const updateBtn = document.getElementById('mark-purchased');
            if (updateBtn) updateBtn.addEventListener('click', () => this.updateInventoryFromPurchases(shoppingItems));
        }
        updateInventoryFromPurchases(shoppingItems) {
            const checked = document.querySelectorAll('.shopping-checkbox:checked');
            let updated = 0;
            checked.forEach(cb => {
                const name = cb.dataset.item;
                const shopItem = shoppingItems.find(i => i.name === name);
                if (shopItem) {
                    const invItem = this.dataStore.getItems().find(i => i.name === name);
                    if (invItem) {
                        this.dataStore.updateItem(invItem.id, { quantity: invItem.quantity + shopItem.buyQuantity });
                        updated++;
                    }
                }
            });
            if (updated) {
                this.showToast(`Updated ${updated} items!`);
                // Also reset all consumed meals (reactivate)
                this.dataStore.resetAllConsumed();
                this.renderPlan();
                this.generateShoppingList(); // refresh list
            } else {
                this.showToast('No items marked as purchased.');
            }
        }

        showToast(msg) {
            const toast = document.createElement('div');
            toast.textContent = msg;
            toast.style.cssText = `position:fixed;top:100px;left:50%;transform:translateX(-50%);background:var(--accent-primary);color:white;padding:1rem 2rem;border-radius:8px;z-index:1001;font-weight:500;box-shadow:0 4px 12px var(--shadow);animation:slideDown 0.3s ease;max-width:80%;text-align:center;`;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.animation = 'slideDown 0.3s ease reverse'; setTimeout(() => toast.remove(), 300); }, 3000);
        }
    }

    document.addEventListener('DOMContentLoaded', () => { window.mealPlannerApp = new MealPlannerApp(); });
</script>
</body>
</html>
