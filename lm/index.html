<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgagely • Reckoner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600&display=swap');
        body { font-family: 'SF Pro Display', system-ui, sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
        }
        .dark .glass { 
            background: rgba(24, 24, 27, 0.95); 
        }
        .pie-chart { width: 240px; height: 240px; border-radius: 9999px; position: relative; }
    </style>
</head>
<body class="bg-zinc-100 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen pb-12">
    <div class="max-w-[480px] mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between px-6 pt-12 pb-6">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-emerald-500 rounded-2xl flex items-center justify-center text-white font-bold text-2xl">🏠</div>
                <span class="font-semibold tracking-tighter text-3xl">Mortgagely</span>
            </div>
            <div class="flex items-center gap-x-2">
                <button onclick="toggleTheme()" class="w-10 h-10 flex items-center justify-center rounded-3xl bg-white dark:bg-zinc-800 shadow-md">
                    <i id="theme-icon" class="fa-solid fa-moon"></i>
                </button>
                <button onclick="showMenu()" class="w-10 h-10 flex items-center justify-center rounded-3xl bg-white dark:bg-zinc-800 shadow-md">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
            </div>
        </div>

        <!-- Input -->
        <div id="input-card" class="mx-5 glass rounded-3xl shadow-xl p-6 mb-8 border border-zinc-200 dark:border-zinc-800">
            <h1 class="text-2xl font-semibold mb-6 text-center">Mortgage Reckoner</h1>
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-zinc-500 dark:text-zinc-400 mb-1.5">PROPERTY PRICE</label>
                    <div class="relative">
                        <span id="prop-currency" class="currency-sym absolute left-5 top-1/2 -translate-y-1/2 text-3xl text-zinc-400">$</span>
                        <input id="property-price" type="number" value="450000" 
                               class="w-full bg-white dark:bg-zinc-900 border border-zinc-300 dark:border-zinc-700 rounded-2xl pl-12 pr-6 py-5 text-3xl font-light focus:outline-none focus:border-emerald-500">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-zinc-500 dark:text-zinc-400 mb-1.5">DEPOSIT %</label>
                        <div class="relative">
                            <input id="deposit-percent" type="number" value="20" step="0.1"
                                   class="w-full bg-white dark:bg-zinc-900 border border-zinc-300 dark:border-zinc-700 rounded-2xl px-6 py-5 text-3xl font-light focus:outline-none focus:border-emerald-500">
                            <span class="absolute right-6 top-1/2 -translate-y-1/2 text-3xl text-zinc-400">%</span>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-zinc-500 dark:text-zinc-400 mb-1.5">DEPOSIT AMOUNT</label>
                        <div class="relative">
                            <span id="dep-currency" class="currency-sym absolute left-5 top-1/2 -translate-y-1/2 text-3xl text-zinc-400">$</span>
                            <input id="deposit-amount" type="number" readonly
                                   class="w-full bg-zinc-100 dark:bg-zinc-800 border border-zinc-300 dark:border-zinc-700 rounded-2xl pl-12 pr-6 py-5 text-3xl font-light">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-zinc-500 dark:text-zinc-400 mb-1.5">LOAN PRINCIPAL</label>
                    <div class="relative">
                        <span id="loan-currency" class="currency-sym absolute left-5 top-1/2 -translate-y-1/2 text-3xl text-zinc-400">$</span>
                        <input id="loan-amount" type="number" readonly
                               class="w-full bg-emerald-50 dark:bg-emerald-950 border border-emerald-200 dark:border-emerald-800 rounded-2xl pl-12 pr-6 py-5 text-3xl font-light">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-zinc-500 dark:text-zinc-400 mb-1.5">TERM (YEARS)</label>
                        <input id="term-years" type="number" value="25" 
                               class="w-full bg-white dark:bg-zinc-900 border border-zinc-300 dark:border-zinc-700 rounded-2xl px-6 py-5 text-3xl font-light focus:outline-none focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-zinc-500 dark:text-zinc-400 mb-1.5">TERM (MONTHS)</label>
                        <input id="term-months" type="number" readonly
                               class="w-full bg-zinc-100 dark:bg-zinc-800 border border-zinc-300 dark:border-zinc-700 rounded-2xl px-6 py-5 text-3xl font-light">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-zinc-500 dark:text-zinc-400 mb-1.5">ANNUAL INTEREST RATE (%)</label>
                    <input id="interest-rate" type="number" step="0.01" value="4.5" 
                           class="w-full bg-white dark:bg-zinc-900 border border-zinc-300 dark:border-zinc-700 rounded-2xl px-6 py-5 text-3xl font-light focus:outline-none focus:border-emerald-500">
                </div>

                <button onclick="calculateMortgage()" 
                        class="w-full py-6 bg-emerald-500 hover:bg-emerald-600 active:bg-emerald-700 text-white font-semibold text-xl rounded-3xl shadow-lg transition-all">
                    CALCULATE MORTGAGE
                </button>
            </div>
        </div>

        <!-- Results -->
        <div id="results" class="hidden mx-5">
            <div class="flex justify-center gap-x-8 mb-8">
                <button onclick="prevMonth()" class="w-12 h-12 rounded-2xl bg-white dark:bg-zinc-800 flex items-center justify-center text-3xl active:scale-95">‹</button>
                <div class="text-center">
                    <div id="month-display" class="text-5xl font-light">1</div>
                    <div class="text-xs tracking-widest text-zinc-400">MONTH</div>
                </div>
                <button onclick="nextMonth()" class="w-12 h-12 rounded-2xl bg-white dark:bg-zinc-800 flex items-center justify-center text-3xl active:scale-95">›</button>
            </div>

            <div class="flex justify-center mb-8">
                <div class="pie-chart relative">
                    <div id="pie" class="w-full h-full rounded-full shadow-inner transition-all"></div>
                    <div class="absolute inset-0 flex items-center justify-center text-center">
                        <div>
                            <div id="pie-remaining" class="text-5xl font-light">300</div>
                            <div class="text-xs text-zinc-400">months left</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="glass rounded-3xl p-5">
                    <div class="text-xs uppercase text-zinc-400">Monthly Payment</div>
                    <div id="monthly-payment" class="text-4xl font-light mt-1 text-emerald-500">1,234</div>
                </div>
                <div class="glass rounded-3xl p-5">
                    <div class="text-xs uppercase text-zinc-400">Total Interest</div>
                    <div id="total-interest" class="text-4xl font-light mt-1 text-amber-400">89,456</div>
                </div>
            </div>

            <div class="glass rounded-3xl p-6 mb-6">
                <div class="flex justify-between items-center">
                    <div>
                        <div class="text-zinc-400 text-sm">This month</div>
                        <div id="this-month-breakdown" class="text-3xl font-medium">1,234</div>
                    </div>
                    <div class="text-right text-sm">
                        <div>Interest: <span id="month-interest" class="text-amber-400"></span></div>
                        <div>Principal: <span id="month-principal" class="text-emerald-500"></span></div>
                    </div>
                </div>
            </div>

            <div class="flex gap-3">
                <button onclick="resetAll()" class="flex-1 py-4 border border-zinc-300 dark:border-zinc-700 rounded-3xl text-sm font-medium">NEW LOAN</button>
                <button onclick="showSchedule()" class="flex-1 py-4 bg-white dark:bg-zinc-800 rounded-3xl text-sm font-medium">FULL SCHEDULE</button>
            </div>

            <!-- Summary -->
            <div id="summary" class="mt-8 text-xs text-zinc-500 dark:text-zinc-400 leading-relaxed px-1">
            </div>
        </div>
    </div>

    <!-- Menu + Modals (unchanged) -->
    <div id="menu" class="hidden fixed inset-0 bg-black/70 z-50 flex items-end">
        <div class="bg-white dark:bg-zinc-900 w-full rounded-t-3xl p-6">
            <div class="flex justify-between mb-6">
                <span class="font-semibold text-lg">Settings</span>
                <button onclick="hideMenu()" class="text-3xl">×</button>
            </div>
            <label class="block text-sm mb-3 text-zinc-500">Currency Symbol</label>
            <div class="grid grid-cols-5 gap-3" id="currency-options"></div>
        </div>
    </div>

    <div id="schedule-modal" class="hidden fixed inset-0 bg-black/70 z-50 flex items-end">
        <div class="bg-white dark:bg-zinc-900 w-full max-w-lg mx-auto rounded-t-3xl max-h-[85vh] flex flex-col">
            <div class="p-5 border-b flex justify-between">
                <span class="font-semibold">Amortization Schedule</span>
                <button onclick="hideSchedule()" class="text-3xl">×</button>
            </div>
            <div id="schedule-list" class="flex-1 overflow-auto p-4 space-y-3"></div>
        </div>
    </div>

    <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-zinc-800 text-white px-5 py-3 rounded-3xl shadow-2xl">
        <span id="toast-text"></span>
    </div>

    <script>
        // ==================== STATE ====================
        let currencySymbol = '$';
        let currentMortgage = null;
        let currentMonthIndex = 0;

        const POPULAR_CURRENCIES = ['$', '£', '€', '¥', '₹', '₽', 'R', 'CHF', 'A$', 'C$'];

        // ==================== UTILITIES ====================
        function saveCurrency() { localStorage.setItem('mortgagely_currency', currencySymbol); }
        function loadCurrency() {
            const saved = localStorage.getItem('mortgagely_currency');
            if (saved) currencySymbol = saved;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').textContent = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2200);
        }

        function updateCurrencySymbols() {
            document.querySelectorAll('.currency-sym').forEach(el => el.textContent = currencySymbol);
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            const icon = document.getElementById('theme-icon');
            icon.classList.toggle('fa-moon', !document.documentElement.classList.contains('dark'));
            icon.classList.toggle('fa-sun', document.documentElement.classList.contains('dark'));
        }

        function formatMoney(amount) {
            return Math.round(amount).toLocaleString();
        }

        // ==================== MENU ====================
        function showMenu() {
            populateCurrencyMenu();
            document.getElementById('menu').classList.remove('hidden');
        }
        function hideMenu() { document.getElementById('menu').classList.add('hidden'); }

        function populateCurrencyMenu() {
            const container = document.getElementById('currency-options');
            container.innerHTML = '';
            POPULAR_CURRENCIES.forEach(sym => {
                const btn = document.createElement('button');
                btn.className = `py-4 text-3xl rounded-2xl transition-all ${sym === currencySymbol ? 'bg-emerald-500 text-white' : 'bg-zinc-100 dark:bg-zinc-800'}`;
                btn.textContent = sym;
                btn.onclick = () => {
                    currencySymbol = sym;
                    saveCurrency();
                    updateCurrencySymbols();
                    if (currentMortgage) renderCurrentMonth();
                    populateCurrencyMenu();
                };
                container.appendChild(btn);
            });
        }

        // ==================== CALCULATION ====================
        function calculateMortgage() {
            const propertyPrice = parseFloat(document.getElementById('property-price').value) || 0;
            const depositPercent = parseFloat(document.getElementById('deposit-percent').value) || 0;
            const annualRate = parseFloat(document.getElementById('interest-rate').value) || 0;
            const termYears = parseFloat(document.getElementById('term-years').value) || 0;

            if (propertyPrice <= 0 || depositPercent < 0 || depositPercent > 100 || annualRate < 0 || termYears <= 0) {
                showToast("Please enter valid values");
                return;
            }

            const depositAmount = Math.round(propertyPrice * (depositPercent / 100));
            const principal = Math.round(propertyPrice - depositAmount);
            const termMonths = Math.round(termYears * 12);

            const monthlyRate = annualRate / 100 / 12;
            const n = termMonths;

            let monthlyPayment = monthlyRate > 0 
                ? principal * (monthlyRate * Math.pow(1 + monthlyRate, n)) / (Math.pow(1 + monthlyRate, n) - 1)
                : principal / n;

            monthlyPayment = Math.round(monthlyPayment);

            let balance = principal;
            let totalInterest = 0;
            let schedule = [];

            for (let month = 1; month <= n; month++) {
                const interestThisMonth = Math.round(balance * monthlyRate);
                let principalThisMonth = monthlyPayment - interestThisMonth;
                balance = Math.max(0, balance - principalThisMonth);
                
                totalInterest += interestThisMonth;

                schedule.push({
                    month: month,
                    payment: monthlyPayment,
                    interest: interestThisMonth,
                    principal: principalThisMonth,
                    balance: balance
                });

                if (balance <= 0) break;
            }

            // Final adjustment
            if (schedule.length > 0) {
                const last = schedule[schedule.length - 1];
                last.payment = last.interest + last.principal;
            }

            currentMortgage = {
                propertyPrice,
                depositPercent,
                depositAmount,
                principal,
                termMonths,
                termYears,
                annualRate,
                monthlyPayment,
                totalInterest: Math.round(totalInterest),
                schedule
            };

            currentMonthIndex = 0;
            document.getElementById('input-card').classList.add('hidden');
            document.getElementById('results').classList.remove('hidden');
            renderCurrentMonth();
        }

        function renderCurrentMonth() {
            if (!currentMortgage) return;
            const entry = currentMortgage.schedule[currentMonthIndex];
            if (!entry) return;

            document.getElementById('month-display').textContent = entry.month;
            document.getElementById('monthly-payment').textContent = formatMoney(currentMortgage.monthlyPayment);
            document.getElementById('total-interest').textContent = formatMoney(currentMortgage.totalInterest);

            document.getElementById('this-month-breakdown').textContent = formatMoney(entry.payment);
            document.getElementById('month-interest').textContent = formatMoney(entry.interest);
            document.getElementById('month-principal').textContent = formatMoney(entry.principal);

            const remaining = currentMortgage.schedule.length - currentMonthIndex;
            document.getElementById('pie-remaining').textContent = remaining;

            const progress = currentMonthIndex / currentMortgage.schedule.length;
            const deg = progress * 360;
            document.getElementById('pie').style.background = `conic-gradient(#10b981 0deg, #10b981 ${deg}deg, #3f3f46 ${deg}deg, #3f3f46 360deg)`;

            // Summary
            updateSummary();
        }

        function updateSummary() {
            if (!currentMortgage) return;
            const startDate = new Date();
            const endDate = new Date(startDate);
            endDate.setMonth(endDate.getMonth() + currentMortgage.termMonths);

            const endStr = endDate.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });

            const html = `
                These figures are based on a property with a purchase price of 
                <span class="font-medium">${currencySymbol}${Math.round(currentMortgage.propertyPrice).toLocaleString()}</span> 
                and a deposit of 
                <span class="font-medium">${currencySymbol}${Math.round(currentMortgage.depositAmount).toLocaleString()}</span> 
                (${currentMortgage.depositPercent}%). 
                The mortgage is for a term of ${currentMortgage.termYears} years (${currentMortgage.termMonths} months) 
                at ${currentMortgage.annualRate}% interest.<br><br>
                If you started this month, you would completely own this property by <span class="font-medium">${endStr}</span>.
            `;
            document.getElementById('summary').innerHTML = html;
        }

        function nextMonth() {
            if (currentMortgage && currentMonthIndex < currentMortgage.schedule.length - 1) {
                currentMonthIndex++;
                renderCurrentMonth();
            }
        }

        function prevMonth() {
            if (currentMonthIndex > 0) {
                currentMonthIndex--;
                renderCurrentMonth();
            }
        }

        function resetAll() {
            if (!confirm("Start a new mortgage calculation?")) return;
            currentMortgage = null;
            currentMonthIndex = 0;
            document.getElementById('input-card').classList.remove('hidden');
            document.getElementById('results').classList.add('hidden');
        }

        function showSchedule() {
            if (!currentMortgage) return;
            const container = document.getElementById('schedule-list');
            container.innerHTML = '';

            currentMortgage.schedule.forEach(entry => {
                const div = document.createElement('div');
                div.className = `p-4 rounded-2xl flex justify-between items-center bg-zinc-100 dark:bg-zinc-800`;
                div.innerHTML = `
                    <div class="font-mono">
                        <span class="text-xl">${entry.month.toString().padStart(3, '0')}</span>
                    </div>
                    <div class="text-right">
                        <div class="font-medium">${currencySymbol}${formatMoney(entry.payment)}</div>
                        <div class="text-xs text-zinc-400">
                            Int: ${currencySymbol}${formatMoney(entry.interest)} • Prin: ${currencySymbol}${formatMoney(entry.principal)}
                        </div>
                    </div>
                    <div class="text-right w-20">
                        <div class="text-emerald-500 text-sm">${currencySymbol}${formatMoney(entry.balance)}</div>
                    </div>
                `;
                container.appendChild(div);
            });
            document.getElementById('schedule-modal').classList.remove('hidden');
        }

        function hideSchedule() {
            document.getElementById('schedule-modal').classList.add('hidden');
        }

        // ==================== INPUT SYNC ====================
        function syncDeposit() {
            const price = parseFloat(document.getElementById('property-price').value) || 0;
            const percent = parseFloat(document.getElementById('deposit-percent').value) || 0;
            const depositAmt = Math.round(price * (percent / 100));
            document.getElementById('deposit-amount').value = depositAmt;
            document.getElementById('loan-amount').value = Math.round(price - depositAmt);
        }

        function syncTerm() {
            const years = parseFloat(document.getElementById('term-years').value) || 0;
            document.getElementById('term-months').value = Math.round(years * 12);
        }

        // ==================== INIT ====================
        function initialize() {
            loadCurrency();
            updateCurrencySymbols();

            if (localStorage.getItem('theme') === 'dark' || 
                window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.classList.add('dark');
            }
            const icon = document.getElementById('theme-icon');
            icon.classList.toggle('fa-sun', document.documentElement.classList.contains('dark'));

            const priceInput = document.getElementById('property-price');
            const percentInput = document.getElementById('deposit-percent');
            const yearsInput = document.getElementById('term-years');

            priceInput.addEventListener('input', syncDeposit);
            percentInput.addEventListener('input', syncDeposit);
            yearsInput.addEventListener('input', syncTerm);

            syncDeposit();
            syncTerm();
        }

        window.onload = initialize;
    </script>
</body>
</html>
