<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loanly • Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600&amp;display=swap');
        
        :root {
            --accent: 234 179 8;
        }
        
        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
        }
        
        .dark .glass {
            background: rgba(30, 30, 30, 0.85);
        }
        
        .tail-container {
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .pie-chart {
            width: 220px;
            height: 220px;
            border-radius: 9999px;
            position: relative;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        
        .payment-dot {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .toast {
            animation: slideUp 0.3s ease forwards;
        }
        
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-zinc-100 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen pb-12 transition-colors">
    <div class="tail-container">
        <!-- Header -->
        <div class="flex items-center justify-between px-6 pt-12 pb-6">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-yellow-400 rounded-2xl flex items-center justify-center text-zinc-900 font-bold text-2xl shadow-inner">£</div>
                <div>
                    <span class="font-semibold tracking-tighter text-3xl">Loanly</span>
                </div>
            </div>
            <button onclick="toggleTheme()" id="theme-toggle"
                    class="w-10 h-10 flex items-center justify-center rounded-3xl bg-white dark:bg-zinc-800 shadow-md active:scale-95 transition-all">
                <i id="theme-icon" class="fa-solid fa-moon text-xl"></i>
            </button>
        </div>

        <!-- Main Content -->
        <div class="px-5">
            <!-- Input Card -->
            <div id="input-card" class="glass rounded-3xl shadow-xl p-6 mb-8 border border-zinc-200 dark:border-zinc-800">
                <h1 class="text-2xl font-semibold mb-6 text-center">New Loan</h1>
                
                <div class="space-y-6">
                    <!-- Loan Amount -->
                    <div>
                        <label class="block text-sm font-medium text-zinc-500 dark:text-zinc-400 mb-1.5">LOAN AMOUNT</label>
                        <div class="relative">
                            <div class="absolute left-5 top-1/2 -translate-y-1/2 text-2xl font-light text-zinc-400">£</div>
                            <input id="loan-amount" 
                                   type="number" 
                                   onkeypress="if(event.key === 'Enter') calculateLoan()"
                                   class="w-full bg-white dark:bg-zinc-900 border border-zinc-300 dark:border-zinc-700 rounded-2xl px-12 py-5 text-3xl font-light focus:outline-none focus:border-yellow-400 transition-colors"
                                   placeholder="12000">
                        </div>
                    </div>

                    <!-- Monthly Payment -->
                    <div>
                        <label class="block text-sm font-medium text-zinc-500 dark:text-zinc-400 mb-1.5">MONTHLY REPAYMENT</label>
                        <div class="relative">
                            <div class="absolute left-5 top-1/2 -translate-y-1/2 text-2xl font-light text-zinc-400">£</div>
                            <input id="monthly-pay" 
                                   type="number" 
                                   onkeypress="if(event.key === 'Enter') calculateLoan()"
                                   class="w-full bg-white dark:bg-zinc-900 border border-zinc-300 dark:border-zinc-700 rounded-2xl px-12 py-5 text-3xl font-light focus:outline-none focus:border-yellow-400 transition-colors"
                                   placeholder="1000">
                        </div>
                    </div>

                    <!-- Interest Rate -->
                    <div>
                        <label class="block text-sm font-medium text-zinc-500 dark:text-zinc-400 mb-1.5">ANNUAL INTEREST RATE</label>
                        <div class="relative">
                            <input id="interest-rate" 
                                   type="number" 
                                   step="0.1"
                                   onkeypress="if(event.key === 'Enter') calculateLoan()"
                                   class="w-full bg-white dark:bg-zinc-900 border border-zinc-300 dark:border-zinc-700 rounded-2xl px-6 py-5 text-3xl font-light focus:outline-none focus:border-yellow-400 transition-colors"
                                   placeholder="5.5">
                            <div class="absolute right-6 top-1/2 -translate-y-1/2 text-2xl font-medium text-zinc-400">%</div>
                        </div>
                    </div>

                    <!-- Calculate Button -->
                    <button onclick="calculateLoan()"
                            class="w-full py-6 bg-yellow-400 hover:bg-yellow-300 active:bg-yellow-500 text-zinc-900 font-semibold text-xl rounded-3xl shadow-lg shadow-yellow-500/30 transition-all flex items-center justify-center gap-x-2">
                        <i class="fa-solid fa-calculator"></i>
                        <span>CALCULATE</span>
                    </button>
                </div>
            </div>

            <!-- Results -->
            <div id="results" class="hidden">
                <!-- Month Navigator -->
                <div class="flex items-center justify-center gap-x-6 mb-8">
                    <button onclick="prevMonth()" 
                            class="w-12 h-12 flex items-center justify-center bg-white dark:bg-zinc-800 rounded-2xl shadow active:scale-95 text-2xl text-zinc-400 hover:text-yellow-400 transition-colors">
                        <i class="fa-solid fa-chevron-left"></i>
                    </button>
                    
                    <div class="text-center">
                        <div id="month-display" class="text-5xl font-light tracking-tighter">1</div>
                        <div class="text-xs uppercase tracking-widest text-zinc-400">MONTH</div>
                    </div>
                    
                    <button onclick="nextMonth()" 
                            class="w-12 h-12 flex items-center justify-center bg-white dark:bg-zinc-800 rounded-2xl shadow active:scale-95 text-2xl text-zinc-400 hover:text-yellow-400 transition-colors">
                        <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>

                <!-- Pie Chart -->
                <div class="flex justify-center mb-8">
                    <div id="pie-container" class="pie-chart relative flex items-center justify-center">
                        <!-- Dynamic conic gradient set by JS -->
                        <div id="pie" 
                             class="w-[210px] h-[210px] rounded-full transition-all"
                             style="background: conic-gradient(#eab308 0deg, #eab308 360deg);"></div>
                        <div class="absolute w-32 h-32 bg-white dark:bg-zinc-900 rounded-full flex flex-col items-center justify-center shadow-inner">
                            <div id="pie-label" class="text-4xl font-light">12</div>
                            <div class="text-xs -mt-1 text-zinc-400">left</div>
                        </div>
                    </div>
                </div>

                <!-- Stats -->
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="glass rounded-3xl p-5 border border-zinc-200 dark:border-zinc-800">
                        <div class="text-xs uppercase tracking-widest text-zinc-400">Balance</div>
                        <div id="current-balance" class="text-4xl font-light mt-1">£12,000</div>
                    </div>
                    <div class="glass rounded-3xl p-5 border border-zinc-200 dark:border-zinc-800">
                        <div class="text-xs uppercase tracking-widest text-zinc-400">Accrued Interest</div>
                        <div id="accrued-interest" class="text-4xl font-light mt-1 text-amber-400">£0</div>
                    </div>
                </div>

                <!-- Payment Info -->
                <div id="payment-info" class="glass rounded-3xl p-6 mb-8 border border-zinc-200 dark:border-zinc-800">
                    <div class="flex justify-between items-center">
                        <div>
                            <div class="text-sm text-zinc-400">This month</div>
                            <div id="this-month-payment" class="text-3xl font-medium">£1,000</div>
                        </div>
                        <div class="h-10 w-px bg-zinc-200 dark:bg-zinc-700"></div>
                        <div class="text-right">
                            <div class="text-sm text-zinc-400">Total interest</div>
                            <div id="total-interest" class="text-3xl font-medium text-amber-400">£0</div>
                        </div>
                    </div>
                </div>

                <!-- Schedule Summary -->
                <div onclick="showSchedule()" 
                     class="glass rounded-3xl p-5 flex items-center justify-between cursor-pointer active:scale-[0.98] transition-all border border-zinc-200 dark:border-zinc-800">
                    <div class="flex items-center gap-x-3">
                        <i class="fa-solid fa-list-check text-yellow-400"></i>
                        <span class="font-medium">Full schedule</span>
                    </div>
                    <i class="fa-solid fa-chevron-right text-zinc-400"></i>
                </div>
            </div>
        </div>

        <!-- Footer hint -->
        <div id="footer-hint" class="text-center text-xs text-zinc-400 mt-10 px-6">
            Enter details above and tap Calculate
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-zinc-800 text-white text-sm px-6 py-3 rounded-3xl shadow-2xl flex items-center gap-x-2 toast">
        <i class="fa-solid fa-circle-check text-emerald-400"></i>
        <span id="toast-text"></span>
    </div>

    <!-- Full Schedule Modal -->
    <div id="schedule-modal" class="hidden fixed inset-0 bg-black/70 flex items-end lg:items-center justify-center z-50">
        <div class="bg-white dark:bg-zinc-900 w-full max-w-lg lg:rounded-3xl rounded-t-3xl max-h-[85vh] overflow-hidden flex flex-col">
            <div class="px-6 py-5 border-b dark:border-zinc-700 flex items-center justify-between">
                <div class="font-semibold">Payment Schedule</div>
                <button onclick="hideSchedule()" class="text-zinc-400 hover:text-zinc-600 dark:hover:text-white">
                    <i class="fa-solid fa-xmark text-2xl"></i>
                </button>
            </div>
            
            <div id="schedule-list" class="overflow-auto flex-1 p-4 space-y-3 text-sm">
                <!-- Populated by JS -->
            </div>
            
            <div class="p-5 border-t dark:border-zinc-700 text-center text-xs text-zinc-400">
                All interest paid in final month
            </div>
        </div>
    </div>

    <script>
        // Tailwind script
        function initTailwind() {
            // Already configured via CDN
        }
        
        let currentLoan = {
            principal: 12000,
            monthly: 1000,
            annualRate: 5.5,
            months: [],
            totalInterest: 0
        };
        
        let currentMonthIndex = 0;
        
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon();
        }
        
        function updateThemeIcon() {
            const icon = document.getElementById('theme-icon');
            const isDark = document.documentElement.classList.contains('dark');
            icon.classList.toggle('fa-moon', !isDark);
            icon.classList.toggle('fa-sun', isDark);
        }
        
        function showToast(message, duration = 2500) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').textContent = message;
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('opacity-0');
                setTimeout(() => {
                    toast.classList.add('hidden');
                    toast.classList.remove('opacity-0');
                }, 300);
            }, duration);
        }
        
        function validateInputs() {
            const principal = parseFloat(document.getElementById('loan-amount').value);
            const monthly = parseFloat(document.getElementById('monthly-pay').value);
            const rate = parseFloat(document.getElementById('interest-rate').value);
            
            if (!principal || principal <= 0) {
                showToast("Please enter a valid loan amount");
                return false;
            }
            if (!monthly || monthly <= 0) {
                showToast("Please enter a monthly repayment");
                return false;
            }
            if (rate < 0) {
                showToast("Interest rate cannot be negative");
                return false;
            }
            if (monthly > principal) {
                showToast("Monthly payment cannot exceed loan amount");
                return false;
            }
            return true;
        }
        
        function calculateLoan() {
            if (!validateInputs()) return;
            
            const principal = Math.round(parseFloat(document.getElementById('loan-amount').value));
            const monthlyPrincipal = Math.round(parseFloat(document.getElementById('monthly-pay').value));
            const annualRate = parseFloat(document.getElementById('interest-rate').value) || 0;
            
            const monthlyRate = annualRate / 100 / 12;
            
            let balance = principal;
            let totalInterest = 0;
            let schedule = [];
            
            // Month 1: Initial disbursement
            schedule.push({
                month: 1,
                balanceStart: balance,
                interestThisMonth: 0,
                principalPaid: 0,
                totalPaid: 0,
                balanceEnd: balance,
                isInterestOnly: false
            });
            
            const numPrincipalPayments = Math.ceil(principal / monthlyPrincipal);
            
            // Generate principal payment months
            for (let i = 1; i <= numPrincipalPayments; i++) {
                const interestThisMonth = Math.round(balance * monthlyRate);
                totalInterest += interestThisMonth;
                
                let principalThisPayment = monthlyPrincipal;
                if (i === numPrincipalPayments) {
                    // Final principal payment may be smaller
                    principalThisPayment = balance;
                }
                
                balance -= principalThisPayment;
                
                schedule.push({
                    month: i + 1,
                    balanceStart: balance + principalThisPayment,
                    interestThisMonth: interestThisMonth,
                    principalPaid: principalThisPayment,
                    totalPaid: principalThisPayment,
                    balanceEnd: Math.max(0, balance),
                    isInterestOnly: false
                });
            }
            
            // Final interest payment month
            const finalMonth = schedule.length + 1;
            schedule.push({
                month: finalMonth,
                balanceStart: 0,
                interestThisMonth: totalInterest,
                principalPaid: 0,
                totalPaid: totalInterest,
                balanceEnd: 0,
                isInterestOnly: true
            });
            
            currentLoan = {
                principal: principal,
                monthly: monthlyPrincipal,
                annualRate: annualRate,
                months: schedule,
                totalInterest: Math.round(totalInterest)
            };
            
            // Save to localStorage
            localStorage.setItem('lastLoan', JSON.stringify(currentLoan));
            
            currentMonthIndex = 0;
            document.getElementById('input-card').classList.add('hidden');
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('footer-hint').classList.add('hidden');
            
            renderCurrentMonth();
            showToast("Loan schedule calculated", 1800);
        }
        
        function renderCurrentMonth() {
            const monthData = currentLoan.months[currentMonthIndex];
            if (!monthData) return;
            
            // Update month display
            document.getElementById('month-display').textContent = monthData.month;
            
            // Balance
            document.getElementById('current-balance').textContent = 
                '£' + monthData.balanceEnd.toLocaleString('en-GB');
            
            // Accrued interest so far
            let accruedSoFar = 0;
            for (let i = 0; i <= currentMonthIndex; i++) {
                if (currentLoan.months[i].interestThisMonth) {
                    accruedSoFar += currentLoan.months[i].interestThisMonth;
                }
            }
            document.getElementById('accrued-interest').textContent = 
                '£' + accruedSoFar.toLocaleString('en-GB');
            
            // This month payment
            const paymentEl = document.getElementById('this-month-payment');
            if (monthData.isInterestOnly) {
                paymentEl.innerHTML = `£${monthData.totalPaid.toLocaleString('en-GB')} <span class="text-xs align-super text-amber-400">(interest)</span>`;
                paymentEl.classList.add('text-amber-400');
            } else {
                paymentEl.textContent = '£' + monthData.totalPaid.toLocaleString('en-GB');
                paymentEl.classList.remove('text-amber-400');
            }
            
            // Total interest
            document.getElementById('total-interest').textContent = 
                '£' + currentLoan.totalInterest.toLocaleString('en-GB');
            
            // Pie chart - remaining principal installments
            const totalPrincipalPayments = currentLoan.months.filter(m => !m.isInterestOnly && m.principalPaid > 0).length;
            const paidPrincipalPayments = currentMonthIndex > 0 ? 
                Math.min(currentMonthIndex, totalPrincipalPayments) : 0;
            
            const remaining = totalPrincipalPayments - paidPrincipalPayments;
            
            document.getElementById('pie-label').textContent = remaining;
            
            // Conic gradient for pie
            const pie = document.getElementById('pie');
            const percentagePaid = totalPrincipalPayments > 0 ? 
                (paidPrincipalPayments / totalPrincipalPayments) * 100 : 0;
            
            // Yellow for paid, slate for remaining
            pie.style.background = `conic-gradient(
                rgb(234 179 8) 0deg,
                rgb(234 179 8) ${percentagePaid * 3.6}deg,
                rgb(63 63 70) ${percentagePaid * 3.6}deg,
                rgb(63 63 70) 360deg
            )`;
        }
        
        function nextMonth() {
            if (currentMonthIndex < currentLoan.months.length - 1) {
                currentMonthIndex++;
                renderCurrentMonth();
            }
        }
        
        function prevMonth() {
            if (currentMonthIndex > 0) {
                currentMonthIndex--;
                renderCurrentMonth();
            }
        }
        
        function showSchedule() {
            const container = document.getElementById('schedule-list');
            container.innerHTML = '';
            
            currentLoan.months.forEach((m, index) => {
                const div = document.createElement('div');
                div.className = `flex justify-between items-center p-4 rounded-2xl ${index === currentMonthIndex ? 'bg-yellow-400/10 border border-yellow-400' : 'bg-zinc-100 dark:bg-zinc-800'}`;
                
                let paymentHTML = '';
                if (m.isInterestOnly) {
                    paymentHTML = `<span class="text-amber-400 font-medium">£${m.totalPaid.toLocaleString('en-GB')} (all interest)</span>`;
                } else if (m.principalPaid > 0) {
                    paymentHTML = `£${m.principalPaid.toLocaleString('en-GB')}`;
                } else {
                    paymentHTML = `<span class="text-zinc-400">—</span>`;
                }
                
                div.innerHTML = `
                    <div class="flex items-center gap-x-4">
                        <div class="w-8 h-8 flex items-center justify-center bg-white dark:bg-zinc-700 rounded-2xl text-sm font-mono font-medium">${m.month}</div>
                        <div>
                            <div class="font-medium">Month ${m.month}</div>
                            <div class="text-xs text-zinc-400">${m.balanceEnd === 0 ? 'Final' : 'Principal payment'}</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="font-mono">${paymentHTML}</div>
                        <div class="text-xs text-zinc-400">Balance: £${m.balanceEnd.toLocaleString('en-GB')}</div>
                    </div>
                `;
                container.appendChild(div);
            });
            
            document.getElementById('schedule-modal').classList.remove('hidden');
        }
        
        function hideSchedule() {
            document.getElementById('schedule-modal').classList.add('hidden');
        }
        
        // Keyboard support
        function setupKeyboard() {
            document.addEventListener('keydown', function(e) {
                if (document.getElementById('results').classList.contains('hidden')) return;
                
                if (e.key === "ArrowRight") {
                    nextMonth();
                } else if (e.key === "ArrowLeft") {
                    prevMonth();
                }
            });
        }
        
        // Load from localStorage
        function loadLastLoan() {
            const saved = localStorage.getItem('lastLoan');
            if (saved) {
                try {
                    currentLoan = JSON.parse(saved);
                    document.getElementById('input-card').classList.add('hidden');
                    document.getElementById('results').classList.remove('hidden');
                    document.getElementById('footer-hint').classList.add('hidden');
                    currentMonthIndex = 0;
                    renderCurrentMonth();
                } catch(e) {}
            }
        }
        
        // Initialize everything
        function initialize() {
            // Tailwind ready
            initTailwind();
            
            // Theme
            if (localStorage.getItem('theme') === 'dark' || 
                (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
            updateThemeIcon();
            
            // Load previous calculation
            loadLastLoan();
            
            // Keyboard
            setupKeyboard();
            
            // Demo values
            if (!localStorage.getItem('lastLoan')) {
                document.getElementById('loan-amount').value = "12000";
                document.getElementById('monthly-pay').value = "1000";
                document.getElementById('interest-rate').value = "4.5";
            }
            
            // Make inputs nicer on mobile
            const inputs = document.querySelectorAll('input[type="number"]');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.scrollIntoView({ behavior: "smooth", block: "center" });
                });
            });
        }
        
        window.onload = initialize;
    </script>
</body>
</html>
