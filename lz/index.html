<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loanly • Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600&display=swap');
        
        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
        }
        .dark .glass {
            background: rgba(30, 30, 30, 0.85);
        }
        
        .pie-chart {
            width: 220px;
            height: 220px;
            border-radius: 9999px;
            position: relative;
        }
        
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-zinc-100 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen pb-12">
    <div class="max-w-[480px] mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between px-6 pt-12 pb-6">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-yellow-400 rounded-2xl flex items-center justify-center text-zinc-900 font-bold text-2xl">L</div>
                <span class="font-semibold tracking-tighter text-3xl">Loanly</span>
            </div>
            
            <div class="flex items-center gap-x-2">
                <button onclick="toggleTheme()" id="theme-toggle"
                        class="w-10 h-10 flex items-center justify-center rounded-3xl bg-white dark:bg-zinc-800 shadow-md">
                    <i id="theme-icon" class="fa-solid fa-moon"></i>
                </button>
                <button onclick="showMenu()" 
                        class="w-10 h-10 flex items-center justify-center rounded-3xl bg-white dark:bg-zinc-800 shadow-md">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
            </div>
        </div>

        <!-- Input Card -->
        <div id="input-card" class="mx-5 glass rounded-3xl shadow-xl p-6 mb-8 border border-zinc-200 dark:border-zinc-800">
            <h1 class="text-2xl font-semibold mb-6 text-center">New Loan</h1>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-zinc-500 dark:text-zinc-400 mb-1.5">LOAN AMOUNT</label>
                    <div class="relative">
                        <span id="currency-symbol-input" class="absolute left-5 top-1/2 -translate-y-1/2 text-3xl font-light text-zinc-400">$</span>
                        <input id="loan-amount" type="number" 
                               class="w-full bg-white dark:bg-zinc-900 border border-zinc-300 dark:border-zinc-700 rounded-2xl pl-12 pr-6 py-5 text-3xl font-light focus:outline-none focus:border-yellow-400"
                               placeholder="12000">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-zinc-500 dark:text-zinc-400 mb-1.5">MONTHLY REPAYMENT</label>
                    <div class="relative">
                        <span id="currency-symbol-input2" class="absolute left-5 top-1/2 -translate-y-1/2 text-3xl font-light text-zinc-400">$</span>
                        <input id="monthly-pay" type="number" 
                               class="w-full bg-white dark:bg-zinc-900 border border-zinc-300 dark:border-zinc-700 rounded-2xl pl-12 pr-6 py-5 text-3xl font-light focus:outline-none focus:border-yellow-400"
                               placeholder="1000">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-zinc-500 dark:text-zinc-400 mb-1.5">ANNUAL INTEREST RATE (%)</label>
                    <input id="interest-rate" type="number" step="0.1" value="5.5"
                           class="w-full bg-white dark:bg-zinc-900 border border-zinc-300 dark:border-zinc-700 rounded-2xl px-6 py-5 text-3xl font-light focus:outline-none focus:border-yellow-400">
                </div>

                <button onclick="calculateLoan()" 
                        class="w-full py-6 bg-yellow-400 hover:bg-yellow-300 active:bg-yellow-500 text-zinc-900 font-semibold text-xl rounded-3xl shadow-lg transition-all">
                    CALCULATE LOAN
                </button>
            </div>
        </div>

        <!-- Results -->
        <div id="results" class="hidden mx-5">
            <div class="flex items-center justify-center gap-x-8 mb-8">
                <button onclick="prevMonth()" class="w-11 h-11 rounded-2xl bg-white dark:bg-zinc-800 flex items-center justify-center text-2xl active:scale-95">‹</button>
                <div class="text-center">
                    <div id="month-display" class="text-5xl font-light">1</div>
                    <div class="text-xs tracking-widest text-zinc-400">MONTH</div>
                </div>
                <button onclick="nextMonth()" class="w-11 h-11 rounded-2xl bg-white dark:bg-zinc-800 flex items-center justify-center text-2xl active:scale-95">›</button>
            </div>

            <!-- Pie -->
            <div class="flex justify-center mb-8">
                <div id="pie-container" class="pie-chart relative">
                    <div id="pie" class="w-[220px] h-[220px] rounded-full shadow-inner transition-all"
                         style="background: conic-gradient(#eab308 0deg, #eab308 300deg, #3f3f46 300deg, #3f3f46 360deg);"></div>
                    <div class="absolute inset-0 flex items-center justify-center">
                        <div class="text-center">
                            <div id="pie-remaining" class="text-5xl font-light">12</div>
                            <div class="text-xs -mt-1 text-zinc-400">payments left</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="glass rounded-3xl p-5">
                    <div class="text-xs uppercase text-zinc-400">Current Balance</div>
                    <div id="current-balance" class="text-4xl font-light mt-1">$12,000</div>
                </div>
                <div class="glass rounded-3xl p-5">
                    <div class="text-xs uppercase text-zinc-400">Total Interest</div>
                    <div id="total-interest" class="text-4xl font-light mt-1 text-amber-400">$0</div>
                </div>
            </div>

            <div class="glass rounded-3xl p-6 mb-6">
                <div class="flex justify-between">
                    <div>
                        <div class="text-zinc-400 text-sm">This month</div>
                        <div id="this-month-action" class="text-3xl font-medium">$1,000</div>
                    </div>
                    <button onclick="toggleSkipCurrentMonth()" 
                            id="skip-btn"
                            class="px-6 py-3 bg-red-500 hover:bg-red-600 text-white rounded-2xl text-sm font-medium active:scale-95 transition-all flex items-center gap-x-2">
                        <i class="fa-solid fa-pause"></i>
                        <span>SKIP</span>
                    </button>
                </div>
            </div>

            <div class="flex gap-3">
                <button onclick="resetAll()" 
                        class="flex-1 py-4 border border-zinc-300 dark:border-zinc-700 rounded-3xl text-sm font-medium">
                    RESET
                </button>
                <button onclick="showSchedule()" 
                        class="flex-1 py-4 bg-white dark:bg-zinc-800 rounded-3xl text-sm font-medium">
                    FULL SCHEDULE
                </button>
            </div>
        </div>
    </div>

    <!-- Hamburger Menu -->
    <div id="menu" class="hidden fixed inset-0 bg-black/70 z-50 flex items-end">
        <div class="bg-white dark:bg-zinc-900 w-full rounded-t-3xl p-6">
            <div class="flex justify-between items-center mb-6">
                <span class="font-semibold text-lg">Settings</span>
                <button onclick="hideMenu()" class="text-3xl leading-none">×</button>
            </div>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-sm mb-3 text-zinc-500">Currency Symbol</label>
                    <div class="grid grid-cols-4 gap-3" id="currency-options">
                        <!-- JS populated -->
                    </div>
                </div>
                
                <button onclick="resetAll();hideMenu()" 
                        class="w-full py-4 bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 rounded-3xl font-medium">
                    Clear All Data
                </button>
            </div>
        </div>
    </div>

    <!-- Schedule Modal -->
    <div id="schedule-modal" class="hidden fixed inset-0 bg-black/70 z-50 flex items-end">
        <div class="bg-white dark:bg-zinc-900 w-full max-w-lg mx-auto rounded-t-3xl max-h-[85vh] flex flex-col">
            <div class="p-5 border-b flex justify-between items-center">
                <span class="font-semibold">Payment Schedule</span>
                <button onclick="hideSchedule()" class="text-3xl">×</button>
            </div>
            <div id="schedule-list" class="flex-1 overflow-auto p-4 space-y-3"></div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-zinc-800 text-white px-5 py-3 rounded-3xl shadow-2xl flex items-center gap-2">
        <span id="toast-text"></span>
    </div>

    <script>
        let currencySymbol = '$';
        let currentLoan = null;
        let currentMonthIndex = 0;
        let skippedMonths = new Set();

        const currencies = ['$', '£', '€', '¥', '₱', '₹', '₽', 'R', 'CHF', 'A$'];

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('theme-icon').classList.toggle('fa-moon', !isDark);
            document.getElementById('theme-icon').classList.toggle('fa-sun', isDark);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').textContent = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2200);
        }

        function populateCurrencies() {
            const container = document.getElementById('currency-options');
            container.innerHTML = '';
            currencies.forEach(sym => {
                const btn = document.createElement('button');
                btn.className = `py-4 text-2xl rounded-2xl transition-all ${sym === currencySymbol ? 'bg-yellow-400 text-zinc-900' : 'bg-zinc-100 dark:bg-zinc-800'}`;
                btn.textContent = sym;
                btn.onclick = () => {
                    currencySymbol = sym;
                    populateCurrencies();
                    updateAllCurrencySymbols();
                    if (currentLoan) renderCurrentMonth();
                };
                container.appendChild(btn);
            });
        }

        function updateAllCurrencySymbols() {
            document.querySelectorAll('.currency-sym').forEach(el => el.textContent = currencySymbol);
        }

        function showMenu() {
            document.getElementById('menu').classList.remove('hidden');
        }

        function hideMenu() {
            document.getElementById('menu').classList.add('hidden');
        }

        function calculateLoan() {
            const principal = parseFloat(document.getElementById('loan-amount').value);
            const monthly = parseFloat(document.getElementById('monthly-pay').value);
            const annualRate = parseFloat(document.getElementById('interest-rate').value) || 0;

            if (!principal || !monthly || principal <= 0 || monthly <= 0) {
                showToast("Please enter valid amounts");
                return;
            }
            if (monthly > principal) {
                showToast("Monthly payment cannot exceed loan");
                return;
            }

            const monthlyRate = annualRate / 100 / 12;

            // Simulate full schedule (without skips first)
            let balance = principal;
            let totalInterest = 0;
            let schedule = [];
            let month = 1;

            // Month 1 - initial
            schedule.push({
                month: 1,
                balanceStart: balance,
                interest: 0,
                principalPaid: 0,
                totalPaid: 0,
                balanceEnd: balance,
                skipped: false
            });

            while (balance > 0 && month < 120) {  // safety limit
                month++;
                const interestThisMonth = Math.round(balance * monthlyRate);
                totalInterest += interestThisMonth;
                let principalPaid = 0;

                const isSkipped = skippedMonths.has(month);

                if (!isSkipped) {
                    principalPaid = Math.min(monthly, balance);
                    balance = Math.max(0, balance - principalPaid);
                }

                schedule.push({
                    month,
                    balanceStart: balance + principalPaid,
                    interest: interestThisMonth,
                    principalPaid,
                    totalPaid: principalPaid + (isSkipped ? interestThisMonth : 0),
                    balanceEnd: balance,
                    skipped: isSkipped
                });

                if (balance === 0) break;
            }

            // Final interest cleanup if needed
            if (balance === 0 && totalInterest > 0) {
                schedule.push({
                    month: month + 1,
                    balanceStart: 0,
                    interest: 0,
                    principalPaid: 0,
                    totalPaid: totalInterest,
                    balanceEnd: 0,
                    skipped: false,
                    isFinalInterest: true
                });
            }

            currentLoan = {
                principal: Math.round(principal),
                monthly: Math.round(monthly),
                annualRate,
                schedule,
                totalInterest: Math.round(totalInterest),
                monthlyRate
            };

            currentMonthIndex = 0;
            skippedMonths.clear();

            document.getElementById('input-card').classList.add('hidden');
            document.getElementById('results').classList.remove('hidden');

            renderCurrentMonth();
            showToast("Loan calculated");
        }

        function renderCurrentMonth() {
            if (!currentLoan) return;
            const m = currentLoan.schedule[currentMonthIndex];
            if (!m) return;

            document.getElementById('month-display').textContent = m.month;

            document.getElementById('current-balance').innerHTML = `${currencySymbol}${m.balanceEnd.toLocaleString('en-GB')}`;

            // Total interest (approximate - recalculates on skip)
            document.getElementById('total-interest').innerHTML = `${currencySymbol}${currentLoan.totalInterest.toLocaleString('en-GB')}`;

            const actionEl = document.getElementById('this-month-action');
            if (m.isFinalInterest) {
                actionEl.innerHTML = `${currencySymbol}${m.totalPaid.toLocaleString('en-GB')} <span class="text-amber-400 text-base">(interest)</span>`;
            } else if (m.skipped) {
                actionEl.innerHTML = `<span class="text-red-400">Skipped — Interest added</span>`;
            } else {
                actionEl.textContent = `${currencySymbol}${m.totalPaid.toLocaleString('en-GB')}`;
            }

            // Pie - remaining principal payments
            const remainingPayments = currentLoan.schedule.filter(s => s.principalPaid > 0 && s.month > m.month).length;
            document.getElementById('pie-remaining').textContent = remainingPayments + (m.balanceEnd > 0 ? 1 : 0);

            const paidRatio = Math.max(0, (currentMonthIndex) / (currentLoan.schedule.length - 1));
            const deg = paidRatio * 360;

            document.getElementById('pie').style.background = `conic-gradient(#eab308 0deg, #eab308 ${deg}deg, #3f3f46 ${deg}deg, #3f3f46 360deg)`;
        }

        function toggleSkipCurrentMonth() {
            if (!currentLoan) return;
            const m = currentLoan.schedule[currentMonthIndex];
            if (m.balanceEnd === 0 || m.isFinalInterest) {
                showToast("Cannot skip final month");
                return;
            }

            if (skippedMonths.has(m.month)) {
                skippedMonths.delete(m.month);
            } else {
                skippedMonths.add(m.month);
            }

            // Recalculate from scratch with new skips
            calculateLoan();
            // Restore position
            currentMonthIndex = Math.min(currentMonthIndex, currentLoan.schedule.length - 1);
            renderCurrentMonth();
        }

        function nextMonth() {
            if (currentLoan && currentMonthIndex < currentLoan.schedule.length - 1) {
                currentMonthIndex++;
                renderCurrentMonth();
            }
        }

        function prevMonth() {
            if (currentMonthIndex > 0) {
                currentMonthIndex--;
                renderCurrentMonth();
            }
        }

        function resetAll() {
            if (confirm("Clear everything and start over?")) {
                currentLoan = null;
                skippedMonths.clear();
                currentMonthIndex = 0;
                document.getElementById('input-card').classList.remove('hidden');
                document.getElementById('results').classList.add('hidden');
                document.getElementById('loan-amount').value = '';
                document.getElementById('monthly-pay').value = '';
                showToast("All data cleared");
            }
        }

        function showSchedule() {
            if (!currentLoan) return;
            const container = document.getElementById('schedule-list');
            container.innerHTML = '';

            currentLoan.schedule.forEach((m, i) => {
                const div = document.createElement('div');
                div.className = `p-4 rounded-2xl flex justify-between items-center ${i === currentMonthIndex ? 'bg-yellow-400/10 border border-yellow-400' : 'bg-zinc-100 dark:bg-zinc-800'}`;
                div.innerHTML = `
                    <div>
                        <span class="font-mono text-lg">${m.month}</span>
                        ${m.skipped ? `<span class="ml-2 text-red-400 text-xs">SKIPPED</span>` : ''}
                    </div>
                    <div class="text-right">
                        <div>${currencySymbol}${m.totalPaid.toLocaleString('en-GB')}</div>
                        <div class="text-xs text-zinc-400">Balance: ${currencySymbol}${m.balanceEnd.toLocaleString('en-GB')}</div>
                    </div>
                `;
                container.appendChild(div);
            });

            document.getElementById('schedule-modal').classList.remove('hidden');
        }

        function hideSchedule() {
            document.getElementById('schedule-modal').classList.add('hidden');
        }

        function initialize() {
            if (localStorage.getItem('theme') === 'dark' || window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.classList.add('dark');
            }
            updateThemeIcon();
            populateCurrencies();
            updateAllCurrencySymbols();

            // Demo values
            document.getElementById('loan-amount').value = "12000";
            document.getElementById('monthly-pay').value = "1000";
        }

        window.onload = initialize;
    </script>
</body>
</html>
