<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loanly • Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600&display=swap');
        body { font-family: 'SF Pro Display', system-ui, sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
        }
        .dark .glass { background: rgba(30, 30, 30, 0.85); }
        .pie-chart { width: 230px; height: 230px; border-radius: 9999px; position: relative; }
    </style>
</head>
<body class="bg-zinc-100 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen pb-12">
    <div class="max-w-[480px] mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between px-6 pt-12 pb-6">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-yellow-400 rounded-2xl flex items-center justify-center text-zinc-900 font-bold text-2xl">L</div>
                <span class="font-semibold tracking-tighter text-3xl">Loanly</span>
            </div>
            <div class="flex items-center gap-x-2">
                <button onclick="toggleTheme()" class="w-10 h-10 flex items-center justify-center rounded-3xl bg-white dark:bg-zinc-800 shadow-md">
                    <i id="theme-icon" class="fa-solid fa-moon"></i>
                </button>
                <button onclick="showMenu()" class="w-10 h-10 flex items-center justify-center rounded-3xl bg-white dark:bg-zinc-800 shadow-md">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
            </div>
        </div>

        <!-- Input -->
        <div id="input-card" class="mx-5 glass rounded-3xl shadow-xl p-6 mb-8 border border-zinc-200 dark:border-zinc-800">
            <h1 class="text-2xl font-semibold mb-6 text-center">New Loan</h1>
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-zinc-500 dark:text-zinc-400 mb-1.5">LOAN AMOUNT</label>
                    <div class="relative">
                        <span class="currency-sym absolute left-5 top-1/2 -translate-y-1/2 text-3xl text-zinc-400">$</span>
                        <input id="loan-amount" type="number" class="w-full bg-white dark:bg-zinc-900 border border-zinc-300 dark:border-zinc-700 rounded-2xl pl-12 pr-6 py-5 text-3xl font-light focus:outline-none focus:border-yellow-400" placeholder="12000">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-zinc-500 dark:text-zinc-400 mb-1.5">MONTHLY REPAYMENT</label>
                    <div class="relative">
                        <span class="currency-sym absolute left-5 top-1/2 -translate-y-1/2 text-3xl text-zinc-400">$</span>
                        <input id="monthly-pay" type="number" class="w-full bg-white dark:bg-zinc-900 border border-zinc-300 dark:border-zinc-700 rounded-2xl pl-12 pr-6 py-5 text-3xl font-light focus:outline-none focus:border-yellow-400" placeholder="1000">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-zinc-500 dark:text-zinc-400 mb-1.5">ANNUAL INTEREST RATE (%)</label>
                    <input id="interest-rate" type="number" step="0.1" value="5.5" class="w-full bg-white dark:bg-zinc-900 border border-zinc-300 dark:border-zinc-700 rounded-2xl px-6 py-5 text-3xl font-light focus:outline-none focus:border-yellow-400">
                </div>

                <button onclick="calculateLoan()" class="w-full py-6 bg-yellow-400 hover:bg-yellow-300 active:bg-yellow-500 text-zinc-900 font-semibold text-xl rounded-3xl shadow-lg transition-all">
                    CALCULATE LOAN
                </button>
            </div>
        </div>

        <!-- Results -->
        <div id="results" class="hidden mx-5">
            <div class="flex justify-center gap-x-8 mb-8">
                <button onclick="prevMonth()" class="w-12 h-12 rounded-2xl bg-white dark:bg-zinc-800 flex items-center justify-center text-3xl active:scale-95">‹</button>
                <div class="text-center">
                    <div id="month-display" class="text-5xl font-light">1</div>
                    <div class="text-xs tracking-widest text-zinc-400">MONTH</div>
                </div>
                <button onclick="nextMonth()" class="w-12 h-12 rounded-2xl bg-white dark:bg-zinc-800 flex items-center justify-center text-3xl active:scale-95">›</button>
            </div>

            <div class="flex justify-center mb-8">
                <div class="pie-chart relative">
                    <div id="pie" class="w-full h-full rounded-full shadow-inner transition-all"></div>
                    <div class="absolute inset-0 flex items-center justify-center text-center">
                        <div>
                            <div id="pie-remaining" class="text-5xl font-light">12</div>
                            <div class="text-xs text-zinc-400">payments left</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="glass rounded-3xl p-5">
                    <div class="text-xs uppercase text-zinc-400">Current Balance</div>
                    <div id="current-balance" class="text-4xl font-light mt-1">$12,000</div>
                </div>
                <div class="glass rounded-3xl p-5">
                    <div class="text-xs uppercase text-zinc-400">Total Interest</div>
                    <div id="total-interest" class="text-4xl font-light mt-1 text-amber-400">$0</div>
                </div>
            </div>

            <div class="glass rounded-3xl p-6 mb-6">
                <div class="flex justify-between items-center">
                    <div>
                        <div class="text-zinc-400 text-sm">This month</div>
                        <div id="this-month-action" class="text-3xl font-medium">$1,000</div>
                    </div>
                    <button onclick="skipCurrentMonth()" 
                            class="px-7 py-3 bg-red-500 hover:bg-red-600 text-white rounded-2xl font-medium active:scale-95 transition-all flex items-center gap-x-2">
                        <i class="fa-solid fa-pause"></i>
                        <span>SKIP MONTH</span>
                    </button>
                </div>
            </div>

            <div class="flex gap-3">
                <button onclick="resetAll()" class="flex-1 py-4 border border-zinc-300 dark:border-zinc-700 rounded-3xl text-sm font-medium">RESET</button>
                <button onclick="showSchedule()" class="flex-1 py-4 bg-white dark:bg-zinc-800 rounded-3xl text-sm font-medium">FULL SCHEDULE</button>
            </div>
        </div>
    </div>

    <!-- Menu + Schedule Modal + Toast (same as before) -->
    <div id="menu" class="hidden fixed inset-0 bg-black/70 z-50 flex items-end">
        <div class="bg-white dark:bg-zinc-900 w-full rounded-t-3xl p-6">
            <div class="flex justify-between mb-6">
                <span class="font-semibold text-lg">Settings</span>
                <button onclick="hideMenu()" class="text-3xl">×</button>
            </div>
            <label class="block text-sm mb-3 text-zinc-500">Currency Symbol</label>
            <div class="grid grid-cols-5 gap-3" id="currency-options"></div>
        </div>
    </div>

    <div id="schedule-modal" class="hidden fixed inset-0 bg-black/70 z-50 flex items-end">
        <div class="bg-white dark:bg-zinc-900 w-full max-w-lg mx-auto rounded-t-3xl max-h-[85vh] flex flex-col">
            <div class="p-5 border-b flex justify-between">
                <span class="font-semibold">Full Payment Schedule</span>
                <button onclick="hideSchedule()" class="text-3xl">×</button>
            </div>
            <div id="schedule-list" class="flex-1 overflow-auto p-4 space-y-3"></div>
        </div>
    </div>

    <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-zinc-800 text-white px-5 py-3 rounded-3xl shadow-2xl">
        <span id="toast-text"></span>
    </div>

    <script>
        // ==================== STATE ====================
        let currencySymbol = '$';
        let currentLoan = null;
        let currentMonthIndex = 0;

        const POPULAR_CURRENCIES = ['$', '£', '€', '¥', '₱', '₹', '₽', 'R', 'CHF', 'A$'];

        // ==================== UTILITIES ====================
        function saveCurrency() { localStorage.setItem('loanly_currency', currencySymbol); }
        function loadCurrency() {
            const saved = localStorage.getItem('loanly_currency');
            if (saved) currencySymbol = saved;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').textContent = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2200);
        }

        function updateCurrencySymbols() {
            document.querySelectorAll('.currency-sym').forEach(el => el.textContent = currencySymbol);
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            const icon = document.getElementById('theme-icon');
            icon.classList.toggle('fa-moon', !document.documentElement.classList.contains('dark'));
            icon.classList.toggle('fa-sun', document.documentElement.classList.contains('dark'));
        }

        // ==================== MENU ====================
        function showMenu() {
            populateCurrencyMenu();
            document.getElementById('menu').classList.remove('hidden');
        }
        function hideMenu() { document.getElementById('menu').classList.add('hidden'); }

        function populateCurrencyMenu() {
            const container = document.getElementById('currency-options');
            container.innerHTML = '';
            POPULAR_CURRENCIES.forEach(sym => {
                const btn = document.createElement('button');
                btn.className = `py-4 text-3xl rounded-2xl transition-all ${sym === currencySymbol ? 'bg-yellow-400 text-zinc-900' : 'bg-zinc-100 dark:bg-zinc-800'}`;
                btn.textContent = sym;
                btn.onclick = () => {
                    currencySymbol = sym;
                    saveCurrency();
                    updateCurrencySymbols();
                    if (currentLoan) renderCurrentMonth();
                    populateCurrencyMenu();
                };
                container.appendChild(btn);
            });
        }

        // ==================== CORE CALCULATION (Month-by-Month with Skips) ====================
        function calculateLoan() {
            const principal = parseFloat(document.getElementById('loan-amount').value);
            const monthlyPayment = parseFloat(document.getElementById('monthly-pay').value);
            const annualRate = parseFloat(document.getElementById('interest-rate').value) || 0;

            if (!principal || !monthlyPayment || principal <= 0 || monthlyPayment <= 0) {
                showToast("Please enter valid amounts");
                return;
            }

            const monthlyRate = annualRate / 100 / 12;

            let balance = principal;
            let totalInterest = 0;
            let schedule = [];
            let month = 1;
            let principalPaymentsMade = 0;
            const requiredPayments = Math.ceil(principal / monthlyPayment);

            // Month 1: Loan given
            schedule.push({
                month: 1,
                type: 'disbursement',
                balanceStart: balance,
                interest: 0,
                principalPaid: 0,
                totalPaid: 0,
                balanceEnd: balance
            });

            while (principalPaymentsMade < requiredPayments && month < 300) {
                month++;

                // Interest accrues every month regardless of skip
                const interestThisMonth = Math.round(balance * monthlyRate);
                totalInterest += interestThisMonth;

                let principalPaid = 0;
                let isSkipped = false;

                // Decide if this should be a payment month
                if (principalPaymentsMade < requiredPayments) {
                    // Check if user has marked this month as skipped
                    if (currentLoan && currentLoan.skips && currentLoan.skips.includes(month)) {
                        isSkipped = true;
                    } else {
                        principalPaid = Math.min(monthlyPayment, balance);
                        balance = Math.max(0, balance - principalPaid);
                        principalPaymentsMade++;
                    }
                }

                schedule.push({
                    month: month,
                    type: isSkipped ? 'skip' : 'payment',
                    balanceStart: balance + principalPaid,
                    interest: interestThisMonth,
                    principalPaid: principalPaid,
                    totalPaid: isSkipped ? 0 : principalPaid,
                    balanceEnd: balance,
                    skipped: isSkipped
                });

                if (balance <= 0) break;
            }

            // Final interest payment
            if (totalInterest > 0) {
                month++;
                schedule.push({
                    month: month,
                    type: 'final_interest',
                    balanceStart: 0,
                    interest: totalInterest,
                    principalPaid: 0,
                    totalPaid: totalInterest,
                    balanceEnd: 0
                });
            }

            currentLoan = {
                principal: Math.round(principal),
                monthlyPayment: Math.round(monthlyPayment),
                annualRate,
                monthlyRate,
                schedule,
                totalInterest: Math.round(totalInterest),
                skips: currentLoan ? currentLoan.skips || [] : []
            };

            currentMonthIndex = 0;
            document.getElementById('input-card').classList.add('hidden');
            document.getElementById('results').classList.remove('hidden');
            renderCurrentMonth();
            showToast("Loan calculated with skip penalties");
        }

        function skipCurrentMonth() {
            if (!currentLoan) return;
            const entry = currentLoan.schedule[currentMonthIndex];
            if (entry.type === 'disbursement' || entry.type === 'final_interest' || entry.skipped) {
                showToast("Cannot skip this month");
                return;
            }

            currentLoan.skips.push(entry.month);
            currentLoan.skips.sort((a,b)=>a-b);

            // Rebuild entire schedule with new skip
            calculateLoan(); // This re-runs full simulation
            // Restore view position
            currentMonthIndex = Math.min(currentMonthIndex, currentLoan.schedule.length - 1);
            renderCurrentMonth();
        }

        // ==================== RENDERING ====================
        function renderCurrentMonth() {
            if (!currentLoan) return;
            const entry = currentLoan.schedule[currentMonthIndex];
            if (!entry) return;

            document.getElementById('month-display').textContent = entry.month;

            document.getElementById('current-balance').innerHTML = `${currencySymbol}${entry.balanceEnd.toLocaleString()}`;
            document.getElementById('total-interest').innerHTML = `${currencySymbol}${currentLoan.totalInterest.toLocaleString()}`;

            const actionEl = document.getElementById('this-month-action');
            if (entry.type === 'skip') {
                actionEl.innerHTML = `<span class="text-red-400">Skipped (interest accrued)</span>`;
            } else if (entry.type === 'final_interest') {
                actionEl.innerHTML = `${currencySymbol}${entry.totalPaid.toLocaleString()} <span class="text-amber-400 text-base">(all interest)</span>`;
            } else {
                actionEl.textContent = `${currencySymbol}${entry.totalPaid.toLocaleString()}`;
            }

            // Remaining principal payments
            const remaining = currentLoan.schedule.slice(currentMonthIndex)
                .filter(e => e.type === 'payment' && e.principalPaid > 0).length;
            document.getElementById('pie-remaining').textContent = remaining;

            const progress = currentMonthIndex / (currentLoan.schedule.length - 1);
            const deg = progress * 360;
            document.getElementById('pie').style.background = `conic-gradient(#eab308 0deg, #eab308 ${deg}deg, #3f3f46 ${deg}deg, #3f3f46 360deg)`;
        }

        function nextMonth() {
            if (currentLoan && currentMonthIndex < currentLoan.schedule.length - 1) {
                currentMonthIndex++;
                renderCurrentMonth();
            }
        }

        function prevMonth() {
            if (currentMonthIndex > 0) {
                currentMonthIndex--;
                renderCurrentMonth();
            }
        }

        function resetAll() {
            if (!confirm("Start a completely new loan?")) return;
            currentLoan = null;
            currentMonthIndex = 0;
            document.getElementById('input-card').classList.remove('hidden');
            document.getElementById('results').classList.add('hidden');
            document.getElementById('loan-amount').value = "12000";
            document.getElementById('monthly-pay').value = "1000";
        }

        function showSchedule() {
            if (!currentLoan) return;
            const container = document.getElementById('schedule-list');
            container.innerHTML = '';

            currentLoan.schedule.forEach(entry => {
                const div = document.createElement('div');
                div.className = `p-4 rounded-2xl flex justify-between ${entry.type === 'skip' ? 'bg-red-50 dark:bg-red-900/20' : 'bg-zinc-100 dark:bg-zinc-800'}`;
                div.innerHTML = `
                    <div>
                        <span class="font-mono text-xl">${entry.month}</span>
                        ${entry.type === 'skip' ? '<span class="ml-3 text-red-500 text-xs font-medium">SKIPPED</span>' : ''}
                    </div>
                    <div class="text-right">
                        <div>${currencySymbol}${entry.totalPaid.toLocaleString()}</div>
                        <div class="text-xs text-zinc-400">Balance: ${currencySymbol}${entry.balanceEnd.toLocaleString()}</div>
                    </div>
                `;
                container.appendChild(div);
            });
            document.getElementById('schedule-modal').classList.remove('hidden');
        }

        function hideSchedule() {
            document.getElementById('schedule-modal').classList.add('hidden');
        }

        // ==================== INIT ====================
        function initialize() {
            loadCurrency();
            updateCurrencySymbols();

            if (localStorage.getItem('theme') === 'dark' || 
                window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.classList.add('dark');
            }
            const icon = document.getElementById('theme-icon');
            icon.classList.toggle('fa-sun', document.documentElement.classList.contains('dark'));

            document.getElementById('loan-amount').value = "12000";
            document.getElementById('monthly-pay').value = "1000";
        }

        window.onload = initialize;
    </script>
</body>
</html>
