name: Auto Build & Deploy to /docs

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allows manual trigger from Actions tab

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for git commit below

      - name: Check for app2 project
        id: app2
        run: |
          if [ -f app2/package-lock.json ] && [ -f app2/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No app2 Node project found; skipping /docs build."
          fi

      - name: Set up Node.js
        if: steps.app2.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: app2/package-lock.json

      - name: Install dependencies
        if: steps.app2.outputs.exists == 'true'
        run: npm ci --prefix app2

      - name: Build app
        if: steps.app2.outputs.exists == 'true'
        run: npm run build --prefix app2

      - name: Copy dist to docs
        if: steps.app2.outputs.exists == 'true'
        run: |
          rm -rf docs
          mkdir -p docs
          cp -r app2/dist/* docs/

      - name: Commit and push docs update
        if: steps.app2.outputs.exists == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add docs
          git commit -m "Auto-update /docs with latest build [ci skip]" || echo "No changes to commit"
          git push
